<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수련회 만족도 조사</title>
<style>
  :root{
    --bg:#f4f1ea; --surface:#ffffff; --ink:#2b2a26; --muted:#76746c;
    --line:#e3dfd4; --accent:#3a6b5e; --accent-soft:#e4efe9; --accent-ink:#274a40;
    --danger:#b3402f; --warn:#c97c1a; --radius:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px; margin:0 auto; padding:32px 20px 80px;}
  header{margin-bottom:24px;}
  header .kicker{font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); font-weight:600;}
  header h1{font-size:27px; font-weight:700; margin-top:4px; letter-spacing:-.01em;}
  header p{color:var(--muted); font-size:14px; margin-top:6px;}

  .tabs{display:flex; gap:8px; margin-bottom:22px;}
  .tab{
    flex:1; height:46px; border:1px solid var(--line); background:var(--surface);
    border-radius:var(--radius); font-size:15px; font-weight:600; color:var(--muted);
    cursor:pointer; transition:.15s;
  }
  .tab:hover{border-color:#cfc9ba;}
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 22px; margin-bottom:16px;
  }
  .card .section-label{
    font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
    font-weight:600; margin-bottom:14px;
  }
  .field{margin-bottom:18px;}
  .field:last-child{margin-bottom:0;}
  .field > label{display:block; font-size:14.5px; font-weight:600; margin-bottom:9px;}
  .hint{font-size:12px; color:var(--muted); margin-top:8px;}

  .btnrow{display:flex; gap:8px;}
  .pick{
    flex:1; min-height:40px; padding:6px 4px; border:1px solid var(--line);
    background:var(--surface); border-radius:10px; cursor:pointer; font-size:13.5px;
    color:var(--ink); transition:.12s; text-align:center;
  }
  .pick:hover{border-color:#cfc9ba;}
  .pick.picked{background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink); font-weight:600;}
  .scale{display:flex; gap:6px; flex-wrap:wrap;}
  .scale .pick{min-width:58px; line-height:1.3;}
  .scale .pick .num{font-size:15px; font-weight:700; display:block;}
  .scale .pick .lab{font-size:10.5px;}

  textarea{
    width:100%; min-height:78px; resize:vertical; padding:10px 12px;
    border:1px solid var(--line); border-radius:10px; font-family:inherit;
    font-size:14px; color:var(--ink); background:#fcfbf8;
  }
  textarea:focus{outline:none; border-color:var(--accent);}

  .primary{
    width:100%; height:50px; border:none; border-radius:var(--radius);
    background:var(--accent); color:#fff; font-size:15.5px; font-weight:700;
    cursor:pointer; transition:.15s;
  }
  .primary:hover{background:#33604f;}
  .primary:disabled{opacity:.55; cursor:default;}
  .ghost{
    height:42px; padding:0 16px; border:1px solid var(--line); background:var(--surface);
    border-radius:10px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer; transition:.12s;
  }
  .ghost:hover{border-color:#cfc9ba;}
  .ghost.accent{background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink);}

  .msg{font-size:13.5px; text-align:center; margin-top:12px; min-height:20px;}
  .msg.ok{color:var(--accent);}
  .msg.err{color:var(--danger);}

  .metrics{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
  .metric{background:var(--accent-soft); border-radius:12px; padding:14px 16px;}
  .metric .ml{font-size:13px; color:var(--accent-ink);}
  .metric .mv{font-size:26px; font-weight:700; color:var(--accent-ink); margin-top:2px;}

  table{width:100%; border-collapse:collapse; font-size:14px;}
  th,td{text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top;}
  th{color:var(--muted); font-weight:600; font-size:12.5px; letter-spacing:.04em;}
  .track{background:#ece8de; border-radius:8px; height:8px; overflow:hidden; margin-top:6px;}
  .fill{background:var(--accent); height:8px;}

  .toolbar{display:flex; gap:8px; flex-wrap:wrap;}
  .toolbar .ghost{flex:1; min-width:120px;}

  .ai-box{border-color:var(--accent);}
  .ai-box .ai-head{font-size:13px; font-weight:700; color:var(--accent-ink); margin-bottom:10px; letter-spacing:.04em;}
  .ai-body{font-size:14px; white-space:pre-wrap; line-height:1.75;}

  .empty{font-size:13.5px; color:var(--muted); padding:6px 0;}
  .config-line{font-size:12px; color:var(--muted); margin-top:10px;}
  .config-line a{color:var(--accent); cursor:pointer; text-decoration:underline;}
  details{margin-top:14px;}
  summary{font-size:13px; color:var(--muted); cursor:pointer;}
  details .field{margin-top:12px;}
  details input{
    width:100%; height:38px; padding:0 12px; border:1px solid var(--line);
    border-radius:9px; font-size:13px; font-family:inherit; background:#fcfbf8;
  }
  .badge{
    display:inline-block; font-size:11.5px; font-weight:600; padding:2px 9px;
    border-radius:20px; background:#ece8de; color:var(--muted);
  }
  .badge.live{background:var(--accent-soft); color:var(--accent-ink);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Youth Retreat</div>
    <h1>수련회 만족도 조사</h1>
    <p>수련회를 마치며 — 학생과 교사의 솔직한 응답을 기다립니다. <span id="modeBadge" class="badge">로컬 모드</span></p>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabSurvey">설문 응답</button>
    <button class="tab" id="tabResult">결과 보기</button>
  </div>

  <div id="panelSurvey"></div>
  <div id="panelResult" style="display:none;"></div>
</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     설문 문항 정의 — 이 부분을 수정하면 문항을 바꿀 수 있습니다.
     ============================================================ */
  const SURVEYS = {
    student: {
      label: "학생",
      rating: [
        {id:"s_worship", q:"예배와 말씀 시간이 은혜로웠다"},
        {id:"s_group",   q:"조별모임에 적극적으로 참여했다"},
        {id:"s_meal",    q:"식사와 숙소 환경에 만족한다"},
        {id:"s_program", q:"레크리에이션·프로그램이 즐거웠다"},
        {id:"s_overall", q:"수련회 전반적으로 만족한다"}
      ],
      text: [
        {id:"s_best",    q:"가장 좋았던 점은 무엇인가요?"},
        {id:"s_improve", q:"아쉬웠던 점이나 바라는 점이 있나요?"}
      ]
    },
    teacher: {
      label: "교사",
      rating: [
        {id:"t_run",     q:"전체 운영과 진행이 원활했다"},
        {id:"t_engage",  q:"학생들의 참여도가 높았다"},
        {id:"t_safety",  q:"안전 관리가 잘 이루어졌다"},
        {id:"t_comm",    q:"교사 간 협력과 소통이 원활했다"},
        {id:"t_overall", q:"수련회 전반적으로 만족한다"}
      ],
      text: [
        {id:"t_best",    q:"이번 수련회에서 잘된 점은 무엇인가요?"},
        {id:"t_improve", q:"개선이 필요한 점이나 제안 사항이 있나요?"}
      ]
    }
  };
  const SCALE = [
    {v:5,l:"매우 그렇다"},{v:4,l:"그렇다"},{v:3,l:"보통"},{v:2,l:"아니다"},{v:1,l:"전혀 아니다"}
  ];

  /* ============================================================
     결과 보기 비밀번호 — 이 값을 바꾸면 비밀번호가 바뀝니다.
     이 비밀번호를 아는 교사만 결과 보기 탭에 들어갈 수 있습니다.
     ============================================================ */
  const RESULT_PASSWORD = "retreat2026";

  /* ============================================================
     공유 저장소 — Supabase 클라우드 (여러 기기에서 응답 공유)
       연결이 안 될 때만 이 PC(localStorage)에 임시 저장
     ============================================================ */
  const SUPABASE_URL = "https://rtwrsygyhfrktlrjqvsd.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0d3JzeWd5aGZya3RscmpxdnNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTM5MzksImV4cCI6MjA5NjA4OTkzOX0.w2-qKZXuT220LI4vxPsryuOGpkUuZf_-IK1rCITJ3Zs";

  // AI 결과 분석용 Gemini 키는 이 파일에 없습니다.
  // Vercel 환경변수 GEMINI_API_KEY 에 저장되어 /api/gemini 서버 함수에서만 사용됩니다.
  // (Supabase anon 키는 공개용이라 그대로 둡니다)

  const Store = {
    mode: "cloud",
    _url: SUPABASE_URL + "/rest/v1/survey_responses",
    _headers(extra){
      return Object.assign({
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json"
      }, extra || {});
    },

    init(){
      if(!SUPABASE_URL || !SUPABASE_ANON_KEY){ this.mode = "local"; }
      else { this.mode = "cloud"; }
    },

    // 응답 저장
    async add(role, record){
      if(this.mode === "cloud"){
        const res = await fetch(this._url, {
          method: "POST",
          headers: this._headers({ "Prefer": "return=minimal" }),
          body: JSON.stringify({
            role: role, ratings: record.ratings, texts: record.texts, ts: record.ts
          })
        });
        if(!res.ok){
          let detail = ""; try{ detail = await res.text(); }catch(e){}
          throw new Error("저장 실패 (" + res.status + ") " + detail.slice(0,160));
        }
        return true;
      }else{
        const uid = Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,9);
        const key = "resp_" + role + "_" + uid;
        const all = this._localAll();
        all[key] = Object.assign({_role:role}, record);
        localStorage.setItem("retreat_responses", JSON.stringify(all));
        return key;
      }
    },

    // 특정 구분(student/teacher)의 모든 응답 불러오기
    async list(role){
      if(this.mode === "cloud"){
        const url = this._url + "?role=eq." + encodeURIComponent(role)
          + "&select=ts,ratings,texts&order=ts.asc";
        const res = await fetch(url, { headers: this._headers() });
        if(!res.ok){
          let detail = ""; try{ detail = await res.text(); }catch(e){}
          throw new Error("불러오기 실패 (" + res.status + ") " + detail.slice(0,160));
        }
        const data = await res.json();
        return (data || []).map(r => ({ ts: r.ts, ratings: r.ratings || {}, texts: r.texts || {} }));
      }else{
        const all = this._localAll();
        return Object.keys(all).map(k=>all[k]).filter(r=>r._role === role);
      }
    },
    _localAll(){
      try{ return JSON.parse(localStorage.getItem("retreat_responses")||"{}"); }
      catch(e){ return {}; }
    }
  };

  /* ============================================================
     화면 제어
     ============================================================ */
  const $ = s => document.querySelector(s);
  const pSurvey = $("#panelSurvey"), pResult = $("#panelResult");
  let role = "student";          // 설문 탭에서 선택한 응답자 구분
  let resultRole = "student";    // 결과 탭에서 선택한 구분
  const answers = {};            // 현재 작성 중인 객관식 응답
  let lastAgg = null;            // 마지막으로 집계한 결과 (AI 분석용)
  let resultUnlocked = false;    // 결과 보기 비밀번호 통과 여부

  function esc(s){
    return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  }
  function updateBadge(){
    const b = $("#modeBadge");
    if(Store.mode === "cloud"){ b.textContent = "클라우드 모드"; b.className = "badge live"; }
    else{ b.textContent = "로컬 모드"; b.className = "badge"; }
  }

  function switchTab(which){
    const isS = which === "survey";
    pSurvey.style.display = isS ? "block" : "none";
    pResult.style.display = isS ? "none" : "block";
    $("#tabSurvey").classList.toggle("active", isS);
    $("#tabResult").classList.toggle("active", !isS);
    if(!isS){
      if(resultUnlocked) renderResult();
      else renderLock();
    }
  }

  /* ---------- 결과 보기 잠금 화면 ---------- */
  function renderLock(){
    pResult.innerHTML = '<div class="card" style="text-align:center; padding:34px 26px;">'
      + '<div style="font-size:30px; margin-bottom:6px;">&#128274;</div>'
      + '<div style="font-size:17px; font-weight:700; margin-bottom:4px;">결과 보기는 잠겨 있습니다</div>'
      + '<p class="hint" style="margin-bottom:18px;">담당 교사만 볼 수 있습니다. 비밀번호를 입력해 주세요.</p>'
      + '<input id="pwInput" type="password" placeholder="비밀번호" '
      + 'style="width:100%; max-width:280px; height:44px; padding:0 14px; border:1px solid var(--line); '
      + 'border-radius:10px; font-size:15px; font-family:inherit; background:#fcfbf8; text-align:center;" />'
      + '<button class="primary" id="pwBtn" style="max-width:280px; margin:14px auto 0;">결과 보기</button>'
      + '<p class="msg" id="pwMsg"></p>'
      + '</div>';

    const input = $("#pwInput");
    const tryUnlock = ()=>{
      if(input.value === RESULT_PASSWORD){
        resultUnlocked = true;
        renderResult();
      }else{
        const m = $("#pwMsg");
        m.className = "msg err";
        m.textContent = "비밀번호가 올바르지 않습니다.";
        input.value = "";
        input.focus();
      }
    };
    $("#pwBtn").onclick = tryUnlock;
    input.onkeydown = e=>{ if(e.key === "Enter") tryUnlock(); };
    input.focus();
  }

  /* ---------- 설문 응답 탭 ---------- */
  function renderSurvey(){
    const cfg = SURVEYS[role];
    let h = "";

    h += '<div class="card">'
      + '<div class="section-label">응답자 구분</div>'
      + '<div class="btnrow">'
      + '<div class="pick rolepick' + (role==="student"?" picked":"") + '" data-r="student">학생</div>'
      + '<div class="pick rolepick' + (role==="teacher"?" picked":"") + '" data-r="teacher">교사</div>'
      + '</div>'
      + '<p class="hint">익명으로 진행됩니다. 이름이나 개인정보를 입력하지 않습니다.</p>'
      + '</div>';

    h += '<div class="card"><div class="section-label">' + cfg.label + ' 만족도 · 객관식 (5점 척도)</div>';
    cfg.rating.forEach((item,i)=>{
      h += '<div class="field"><label>' + (i+1) + '. ' + esc(item.q) + '</label>'
        + '<div class="scale" data-q="' + item.id + '">';
      SCALE.forEach(s=>{
        h += '<div class="pick" data-v="' + s.v + '">'
          + '<span class="num">' + s.v + '</span>'
          + '<span class="lab">' + s.l + '</span></div>';
      });
      h += '</div></div>';
    });
    h += '</div>';

    h += '<div class="card"><div class="section-label">주관식</div>';
    cfg.text.forEach((item,i)=>{
      h += '<div class="field"><label>' + (i+1) + '. ' + esc(item.q) + '</label>'
        + '<textarea data-tq="' + item.id + '" placeholder="자유롭게 작성해 주세요"></textarea></div>';
    });
    h += '</div>';

    h += '<button class="primary" id="submitBtn">제출하기</button>'
      + '<p class="msg" id="submitMsg"></p>';

    pSurvey.innerHTML = h;

    pSurvey.querySelectorAll(".rolepick").forEach(el=>{
      el.onclick = ()=>{
        role = el.dataset.r;
        for(const k in answers) delete answers[k];
        renderSurvey();
      };
    });
    pSurvey.querySelectorAll(".scale").forEach(sc=>{
      sc.querySelectorAll(".pick").forEach(btn=>{
        btn.onclick = ()=>{
          sc.querySelectorAll(".pick").forEach(x=>x.classList.remove("picked"));
          btn.classList.add("picked");
          answers[sc.dataset.q] = Number(btn.dataset.v);
        };
      });
    });
    $("#submitBtn").onclick = submit;
  }

  async function submit(){
    const cfg = SURVEYS[role];
    const msg = $("#submitMsg");
    for(const item of cfg.rating){
      if(answers[item.id] == null){
        msg.className = "msg err";
        msg.textContent = "모든 객관식 문항에 응답해 주세요.";
        return;
      }
    }
    const record = { ts: Date.now(), ratings:{}, texts:{} };
    cfg.rating.forEach(it=>{ record.ratings[it.id] = answers[it.id]; });
    cfg.text.forEach(it=>{
      const el = pSurvey.querySelector('[data-tq="' + it.id + '"]');
      record.texts[it.id] = (el && el.value.trim()) || "";
    });

    const btn = $("#submitBtn");
    btn.disabled = true; btn.textContent = "제출 중...";
    try{
      await Store.add(role, record);
      msg.className = "msg ok";
      msg.textContent = "응답이 제출되었습니다. 감사합니다!";
      for(const k in answers) delete answers[k];
      setTimeout(renderSurvey, 1400);
    }catch(e){
      msg.className = "msg err";
      msg.textContent = "제출 오류: " + (e && e.message ? e.message : "알 수 없는 오류");
      console.error("submit error:", e);
      btn.disabled = false; btn.textContent = "제출하기";
    }
  }

  /* ---------- 결과 보기 탭 ---------- */
  function renderResult(){
    let h = '<div class="card">'
      + '<div class="section-label">결과 구분</div>'
      + '<div class="btnrow" style="margin-bottom:12px;">'
      + '<div class="pick respick' + (resultRole==="student"?" picked":"") + '" data-r="student">학생 결과</div>'
      + '<div class="pick respick' + (resultRole==="teacher"?" picked":"") + '" data-r="teacher">교사 결과</div>'
      + '</div>'
      + '<div class="toolbar">'
      + '<button class="ghost" id="refreshBtn">↻ 새로고침</button>'
      + '<button class="ghost" id="csvBtn">⤓ 엑셀(CSV) 저장</button>'
      + '<button class="ghost accent" id="aiBtn">✨ AI 분석</button>'
      + '<button class="ghost" id="lockBtn">&#128274; 잠그기</button>'
      + '</div>'
      + '<p class="hint" style="margin-top:10px;">☁️ 클라우드 모드 — 여러 기기에서 제출한 응답이 자동으로 모입니다. ↻ 새로고침을 누르면 최신 응답을 불러옵니다.</p>'
      + '</div>'
      + '<div id="resultBody"><p class="empty">새로고침을 눌러 응답을 불러오세요.</p></div>';

    pResult.innerHTML = h;

    pResult.querySelectorAll(".respick").forEach(el=>{
      el.onclick = ()=>{ resultRole = el.dataset.r; renderResult(); loadResults(); };
    });
    $("#refreshBtn").onclick = loadResults;
    $("#csvBtn").onclick = exportCSV;
    $("#aiBtn").onclick = runAI;
    $("#lockBtn").onclick = ()=>{
      resultUnlocked = false;
      lastAgg = null;
      renderLock();
    };
  }

  async function loadResults(){
    const body = $("#resultBody");
    body.innerHTML = '<p class="empty">불러오는 중...</p>';
    try{
      const records = await Store.list(resultRole);
      renderAggregate(records);
    }catch(e){
      console.error("load error:", e);
      body.innerHTML = '<p class="empty" style="color:var(--danger);">결과 불러오기 오류: ' + esc(e && e.message ? e.message : "알 수 없음") + '</p>';
    }
  }

  function renderAggregate(records){
    const cfg = SURVEYS[resultRole];
    const body = $("#resultBody");
    const n = records.length;

    if(n === 0){
      lastAgg = null;
      body.innerHTML = '<p class="empty">아직 ' + cfg.label + ' 응답이 없습니다.</p>';
      return;
    }

    const avgs = cfg.rating.map(item=>{
      const vals = records.map(r=>r.ratings && r.ratings[item.id])
                          .filter(v=>typeof v === "number");
      const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      return { id:item.id, q:item.q, avg:avg, count:vals.length };
    });
    const overall = avgs.reduce((a,b)=>a+b.avg,0) / avgs.length;

    lastAgg = {
      role:resultRole, label:cfg.label, n:n, overall:overall, avgs:avgs,
      texts: cfg.text.map(t=>({
        q:t.q,
        answers: records.map(r=>r.texts && r.texts[t.id])
                        .filter(x=>x && x.trim())
      }))
    };

    let h = '<div class="metrics">'
      + '<div class="metric"><div class="ml">총 응답 수</div><div class="mv">' + n + '명</div></div>'
      + '<div class="metric"><div class="ml">전체 평균</div><div class="mv">' + overall.toFixed(2) + ' / 5</div></div>'
      + '</div>';

    h += '<div class="card"><div class="section-label">항목별 평균</div>'
      + '<table><thead><tr><th>문항</th><th style="width:84px; text-align:right;">평균</th></tr></thead><tbody>';
    avgs.forEach((a,i)=>{
      const pct = (a.avg/5*100).toFixed(0);
      h += '<tr><td>' + (i+1) + '. ' + esc(a.q)
        + '<div class="track"><div class="fill" style="width:' + pct + '%;"></div></div></td>'
        + '<td style="text-align:right; font-weight:700;">' + a.avg.toFixed(2) + '</td></tr>';
    });
    h += '</tbody></table></div>';

    lastAgg.texts.forEach(t=>{
      h += '<div class="card"><div class="section-label">' + esc(t.q)
        + ' · ' + t.answers.length + '건</div>';
      if(t.answers.length === 0){
        h += '<p class="empty">작성된 답변이 없습니다.</p>';
      }else{
        h += '<table><thead><tr><th style="width:46px;">번호</th><th>답변</th></tr></thead><tbody>';
        t.answers.forEach((ans,i)=>{
          h += '<tr><td>' + (i+1) + '</td><td>' + esc(ans) + '</td></tr>';
        });
        h += '</tbody></table>';
      }
      h += '</div>';
    });

    h += '<div id="aiResult"></div>';
    body.innerHTML = h;
  }

  /* ---------- CSV 내려받기 ---------- */
  async function exportCSV(){
    const cfg = SURVEYS[resultRole];
    let records;
    try{ records = await Store.list(resultRole); }
    catch(e){ alert("데이터를 불러오지 못했습니다."); return; }
    if(records.length === 0){ alert("저장된 응답이 없습니다."); return; }

    const head = ["제출시각"]
      .concat(cfg.rating.map(r=>r.q))
      .concat(cfg.text.map(t=>t.q));
    const rows = [head];
    records.sort((a,b)=>(a.ts||0)-(b.ts||0)).forEach(r=>{
      const row = [ r.ts ? new Date(r.ts).toLocaleString("ko-KR") : "" ];
      cfg.rating.forEach(it=> row.push(r.ratings && r.ratings[it.id] != null ? r.ratings[it.id] : ""));
      cfg.text.forEach(it=> row.push((r.texts && r.texts[it.id]) || ""));
      rows.push(row);
    });
    const csv = rows.map(row=>
      row.map(c=>'"' + String(c).replace(/"/g,'""') + '"').join(",")
    ).join("\r\n");

    const blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "수련회_만족도_" + cfg.label + ".csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ---------- AI 분석 ---------- */
  async function runAI(){
    if(!lastAgg){
      alert("먼저 새로고침으로 응답을 불러온 뒤 AI 분석을 실행하세요.");
      return;
    }
    let box = $("#aiResult");
    if(!box){ box = document.createElement("div"); box.id = "aiResult"; $("#resultBody").appendChild(box); }
    box.innerHTML = '<div class="card"><p class="empty">AI가 분석 중입니다...</p></div>';

    const a = lastAgg;
    let summary = "수련회 만족도 조사 집계 결과입니다.\n"
      + "응답자 구분: " + a.label + "\n"
      + "총 응답 수: " + a.n + "명\n"
      + "전체 평균: " + a.overall.toFixed(2) + "/5\n\n[항목별 평균]\n";
    a.avgs.forEach((x,i)=>{ summary += (i+1) + ". " + x.q + ": " + x.avg.toFixed(2) + "/5\n"; });
    a.texts.forEach(t=>{
      summary += "\n[주관식: " + t.q + "]\n";
      t.answers.slice(0,40).forEach(ans=>{ summary += "- " + ans + "\n"; });
    });

    const prompt = "당신은 교회 청소년부 수련회 운영을 돕는 분석가입니다. "
      + "아래는 수련회 종료 후 진행한 만족도 조사의 집계 결과입니다. "
      + "이 데이터를 분석하여 한국어로 정리해 주세요.\n\n" + summary
      + "\n\n다음 세 가지 항목으로 구분하여 작성해 주세요:\n"
      + "1. 잘된 점 (수치와 주관식 답변 근거 포함)\n"
      + "2. 보완할 점 (낮은 점수 항목과 아쉬움 의견 중심)\n"
      + "3. 다음 수련회에서 개선할 점 (구체적이고 실행 가능한 제안)\n\n"
      + "각 항목은 2~4개의 핵심 포인트로 간결하게 정리해 주세요.";

    try{
      const res = await fetch("/api/gemini", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ prompt: prompt, temperature: 0.7 })
      });
      if(!res.ok) throw new Error("api");
      const data = await res.json();
      const text = (data?.text || "").trim();
      box.innerHTML = '<div class="card ai-box">'
        + '<div class="ai-head">✨ AI 분석 결과 · ' + esc(a.label) + '</div>'
        + '<div class="ai-body">' + esc(text || "분석 결과를 받지 못했습니다.") + '</div>'
        + '</div>';
    }catch(e){
      box.innerHTML = '<div class="card">'
        + '<p class="empty" style="color:var(--danger);">AI 분석을 실행하지 못했습니다.</p>'
        + '<p class="hint">설정이 완료되지 않았거나 잠시 연결이 원활하지 않을 수 있어요. '
        + '잠시 후 다시 시도하시거나, "엑셀(CSV) 저장"으로 결과를 내려받아 활용하실 수 있습니다.</p>'
        + '</div>';
    }
  }

  /* ---------- 초기화 ---------- */
  $("#tabSurvey").onclick = ()=>switchTab("survey");
  $("#tabResult").onclick = ()=>switchTab("result");

  Store.init();
  updateBadge();
  renderSurvey();
})();
</script>
